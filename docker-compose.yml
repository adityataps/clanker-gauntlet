services:
  postgres:
    image: postgres:18-trixie
    environment:
      POSTGRES_USER: clanker
      POSTGRES_PASSWORD: clanker
      POSTGRES_DB: clanker_gauntlet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clanker -d clanker_gauntlet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-trixie
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# ── Worker (optional, for containerised dev) ──────────────────────────────────
# Uncomment when you have a Dockerfile. For local dev, run the worker directly:
#   taskiq worker backend.worker:broker
